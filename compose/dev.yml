services:

  baikal:
    volumes:
      - ${LOGS_DIR:-./runtime/logs}:/logs

  jellyfin:
    volumes:
      - type: bind
        source: ${MEDIA_DATA_PATH:-./runtime/media}
        target: /media
        read_only: true
        bind:
            propagation: ${MEDIA_PROPAGATION:-rshared}
      - ${LOGS_DIR:-./runtime/logs}:/logs

  minio:
    volumes:
      - ${LOGS_DIR:-./runtime/logs}:/logs


  rclone:
    devices:
      - /dev/fuse:/dev/fuse
    volumes:
      - type: bind
        source: ${MEDIA_DATA_PATH:-./runtime/media}
        target: /media
        bind:
          propagation: ${MEDIA_PROPAGATION:-rshared}
      - rclone_config_data:/config/rclone:ro
      - ${LOGS_DIR:-./runtime/logs}:/logs

  restic:
    volumes:
      - ${RESTIC_REPO_DIR:-restic_repo_data}:/repo
      - ${BACKUPS_DIR:-backups_data}:/backups

volumes:
  rclone_config_data:
    name: "${PROJECT_NAME:-server-apps}_rclone_config"
    external: true
  restic_repo_data:
    name: "${PROJECT_NAME:-server-apps}_restic"
  backups_data:
    name: "${PROJECT_NAME:-server-apps}_backups"
    external: true
