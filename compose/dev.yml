# cspell:words rprivate rshared rslave

services:
  baikal:
    volumes:
      - ${LOGS_DIR:-./runtime/logs}:/logs

  jellyfin:
    volumes:
      - ${LOGS_DIR:-./runtime/logs}:/logs

  minio:
    volumes:
      - ${LOGS_DIR:-./runtime/logs}:/logs

  rclone:
    devices:
      - /dev/fuse:/dev/fuse
    volumes:
      - rclone_config_data:/config/rclone:ro
      - ${LOGS_DIR:-./runtime/logs}:/logs
volumes:
  rclone_config_data:
    name: "rclone_config"
    external: true
