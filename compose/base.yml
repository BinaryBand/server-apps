services:
  baikal:
    image: ckulka/baikal:0.10.1
    container_name: baikal
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    ports:
      - "5234:80"
    volumes:
      - cloud_baikal_config:/var/www/baikal/config
      - cloud_baikal_data:/var/www/baikal/Specific

  jellyfin:
    container_name: jellyfin
    image: jellyfin/jellyfin:${JELLYFIN_VERSION:-latest}
    security_opt:
      - no-new-privileges:true
    user: "${PUID:-1000}:${PGID:-1000}"
    depends_on:
      rclone:
        condition: service_started
    group_add:
      - "${MEDIA_GID:-3000}"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - JELLYFIN_CACHE_DIR=/var/cache/jellyfin
      - JELLYFIN_CONFIG_DIR=/etc/jellyfin
      - JELLYFIN_DATA_DIR=/var/lib/jellyfin
      - JELLYFIN_LOG_DIR=/logs
    volumes:
      - jellyfin_cache_data:/var/cache/jellyfin
      - cloud_jellyfin_config:/etc/jellyfin
      - cloud_jellyfin_data:/var/lib/jellyfin
      - /media
      - /logs
    ports:
      - "8096:8096"
    restart: unless-stopped

  minio:
    container_name: minio
    image: minio/minio:${MINIO_VERSION:-latest}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    volumes:
      - type: bind
        source: ${MINIO_DATA_DIR:-./minio}
        target: /data
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:9000/minio/health/live || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  rclone:
    container_name: rclone
    image: rclone/rclone:${RCLONE_VERSION:-latest}
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    environment:
      - PUID=${PUID:-1000}
      - MEDIA_GID=${MEDIA_GID:-3000}
      - RCLONE_CONFIG=/config/rclone/rclone.conf
    command: >-
      mount "${RCLONE_REMOTE:-pcloud}:Media" /media/pcloud/Media
      --allow-other
      --vfs-cache-mode writes
      --vfs-cache-max-size 5G
      --vfs-cache-max-age 12h
      --read-only
      --uid "${PUID:-1000}"
      --gid "${MEDIA_GID:-3000}"
      --umask 022
      --log-file /logs/media.log
      --log-level DEBUG
    volumes:
      - /media
      - /config/rclone
      - /logs
    restart: unless-stopped


  restic:
    image: restic/restic:0.18.1
    restart: "no"
    environment:
      - RESTIC_PASSWORD=${RESTIC_PASSWORD:?Set RESTIC_PASSWORD in .env}
    volumes:
      - restic_repo_data:/repo
      - backups_data:/backups
    profiles:
      - on-demand

volumes:
  cloud_jellyfin_config:
    name: "${PROJECT_NAME:-server-apps}_jellyfin_config"
    external: true
  cloud_jellyfin_data:
    name: "${PROJECT_NAME:-server-apps}_jellyfin_data"
    external: true
  jellyfin_cache_data:
  cloud_baikal_config:
    name: "${PROJECT_NAME:-server-apps}_baikal_config"
    external: true
  cloud_baikal_data:
    name: "${PROJECT_NAME:-server-apps}_baikal_data"
    external: true
  restic_repo_data:
    name: "${PROJECT_NAME:-server-apps}_restic_repo_data"
    external: true
  backups_data:
