services:
  init:
    image: alpine:3.20
    restart: "no"
    security_opt:
      - no-new-privileges:true
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    entrypoint: ["sh", "-c"]
    command:
      - 'mkdir -p /etc/jellyfin /var/cache/jellyfin /var/lib/jellyfin /media /logs && chown -R "${PUID:-1000}:${PGID:-1000}" /etc/jellyfin /var/cache/jellyfin /var/lib/jellyfin /media || true'
    volumes:
      - type: bind
        source: ${JELLYFIN_CONFIG_DIR:-./jellyfin/config}
        target: /etc/jellyfin
      - type: bind
        source: ${JELLYFIN_CACHE_DIR:-./jellyfin/cache}
        target: /var/cache/jellyfin
      - type: bind
        source: ${JELLYFIN_DATA_DIR:-./jellyfin/data}
        target: /var/lib/jellyfin

  baikal:
    image: ckulka/baikal:0.10.1
    container_name: baikal
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      init:
        condition: service_completed_successfully
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    ports:
      - "5234:80"
    volumes:
      - cloud_baikal_config:/var/www/baikal/config
      - cloud_baikal_data:/var/www/baikal/Specific

  jellyfin:
    image: jellyfin/jellyfin:${JELLYFIN_VERSION:-latest}
    security_opt:
      - no-new-privileges:true
    user: "${PUID:-1000}:${PGID:-1000}"
    depends_on:
      init:
        condition: service_completed_successfully
      rclone:
        condition: service_started
    group_add:
      - "${MEDIA_GID:-3000}"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - JELLYFIN_CACHE_DIR=/var/cache/jellyfin
      - JELLYFIN_CONFIG_DIR=/etc/jellyfin
      - JELLYFIN_DATA_DIR=/var/lib/jellyfin
      - JELLYFIN_LOG_DIR=/logs
    volumes:
      - type: bind
        source: ${JELLYFIN_CACHE_DIR:-./jellyfin/cache}
        target: /var/cache/jellyfin
      - type: bind
        source: ${JELLYFIN_CONFIG_DIR:-./jellyfin/config}
        target: /etc/jellyfin
      - type: bind
        source: ${JELLYFIN_DATA_DIR:-./jellyfin/data}
        target: /var/lib/jellyfin
      - /media
      - /logs
    ports:
      - "8096:8096"
    restart: unless-stopped

  minio:
    image: minio/minio:${MINIO_VERSION:-latest}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      init:
        condition: service_completed_successfully
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    volumes:
      - type: bind
        source: ${MINIO_DATA_DIR:-./minio}
        target: /data
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:9000/minio/health/live || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  rclone:
    image: rclone/rclone:${RCLONE_VERSION:-latest}
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    environment:
      - PUID=${PUID:-1000}
      - MEDIA_GID=${MEDIA_GID:-3000}
      - RCLONE_CONFIG=/config/rclone/rclone.conf
    volumes:
      - /media
      - /config/rclone
      - /logs
    restart: unless-stopped

  minio-setup:
    image: minio/mc:${MINIO_MC_VERSION:-latest}
    restart: "no"
    depends_on:
      minio:
        condition: service_started
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    entrypoint: ["sh", "-c"]
    command: >
      until mc alias set minio http://minio:9000 "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}" 2>/dev/null; do
        sleep 1;
      done;
      mc mb --ignore-existing minio/media;
      mc anonymous set download minio/media;

  restic:
    image: restic/restic:0.18.1
    restart: "no"
    environment:
      - RESTIC_REPOSITORY=${RESTIC_REPOSITORY:-/repo}
      - RESTIC_PASSWORD=${RESTIC_PASSWORD:?Set RESTIC_PASSWORD in .env}
    volumes:
      - /repo
      - /backups
    profiles:
      - on-demand

volumes:
  cloud_baikal_config:
    name: "${PROJECT_NAME:-server-apps}_baikal_config"
    external: true
  cloud_baikal_data:
    name: "${PROJECT_NAME:-server-apps}_baikal_data"
    external: true
