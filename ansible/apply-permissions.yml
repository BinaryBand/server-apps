---
- name: Apply host permissions manifest
  hosts: local
  gather_facts: false

  vars:
    permissions_manifest_path: "{{ manifest_path | default('ansible/permissions.yml') }}"
    repo_root_path: "{{ repo_root | default(playbook_dir ~ '/..') }}"
    project_name_selected: "cloud-apps"
    permissions_mode_selected: "{{ permissions_mode | default('runtime') }}"
    apply_privileged: "{{ permissions_mode_selected == 'bootstrap' }}"
    apply_reset: "{{ permissions_mode_selected == 'reset' }}"
    runtime_recover_with_become_enabled: "{{ (runtime_recover_with_become_request | default(false)) | bool }}"
    reset_uid_selected: "{{ (reset_uid | default('1000')) | int }}"
    reset_gid_selected: "{{ (reset_gid | default('1000')) | int }}"
    volume_entries: "{{ permissions_data.volumes | default([]) }}"
    reset_paths: "{{ permissions_data.reset_paths | default([]) }}"
    rclone_config_volume_name: "rclone_config"
    rclone_env:
      PCLOUD_ACCESS_TOKEN: "{{ lookup('ansible.builtin.env', 'PCLOUD_ACCESS_TOKEN', default='') }}"
      PCLOUD_EXPIRY: "{{ lookup('ansible.builtin.env', 'PCLOUD_EXPIRY', default='') }}"
      MINIO_ROOT_USER: "{{ lookup('ansible.builtin.env', 'MINIO_ROOT_USER', default=lookup('ansible.builtin.env', 'S3_ACCESS_KEY', default='')) }}"
      MINIO_ROOT_PASSWORD: "{{ lookup('ansible.builtin.env', 'MINIO_ROOT_PASSWORD', default=lookup('ansible.builtin.env', 'S3_SECRET_KEY', default='')) }}"

  tasks:
    - name: Load permissions manifest
      ansible.builtin.include_vars:
        file: "{{ permissions_manifest_path }}"
        name: permissions_data

    - name: Reconcile startup permissions and runtime state
      ansible.builtin.include_tasks:
        file: tasks/reconcile-startup.yml
      when: not apply_reset

    - name: Normalize ownership and permissions for reset paths
      ansible.builtin.command:
        argv:
          - docker
          - run
          - --rm
          - -v
          - "{{ (item.path if item.path.startswith('/') else repo_root_path ~ '/' ~ item.path) }}:/target"
          - alpine:3.20
          - sh
          - -lc
          - |
            set -e
            mkdir -p /target
            drift="$(find /target \( ! -uid {{ reset_uid_selected }} -o ! -gid {{ reset_gid_selected }} \)
              -print -quit 2>/dev/null || true)"
            if [ -n "$drift" ]; then
              chown -R {{ reset_uid_selected }}:{{ reset_gid_selected }} /target
              chmod -R u+rwX /target
              echo fixed
            fi
      loop: "{{ reset_paths }}"
      register: reset_paths_fix
      changed_when: "'fixed' in reset_paths_fix.stdout"
      when:
        - apply_reset
        - item.path | default('') | length > 0
