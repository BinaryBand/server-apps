- name: Derive service identities and MinIO path
  ansible.builtin.include_role:
    name: identity

- name: Promote identity role facts to service-scoped names
  ansible.builtin.set_fact:
    service_identities: "{{ identity_service_identities }}"
    minio_volume_path: "{{ identity_minio_volume_path }}"
  when: identity_service_identities is defined

- name: Ensure declared groups exist
  become: true
  ansible.builtin.group:
    name: "{{ item.key }}"
    gid: "{{ item.value.gid | int }}"
    non_unique: true
    state: present
  loop: "{{ service_identities | dict2items }}"
  when: apply_privileged

- name: Ensure declared users exist
  become: true
  ansible.builtin.user:
    name: "{{ item.key }}"
    uid: "{{ item.value.uid | int }}"
    group: "{{ item.key }}"
    shell: /usr/sbin/nologin
    create_home: false
    comment: "{{ item.value.comment | default(item.key) }}"
    state: present
  loop: "{{ service_identities | dict2items }}"
  when: apply_privileged

- name: Apply host-bind volume directories and permissions
  ansible.builtin.include_role:
    name: storage

- name: Normalize MinIO media bucket metadata ownership
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - -v
      - "{{ minio_volume_path }}:/target"
      - alpine:3.20
      - sh
      - -lc
      - |
        set -e
        if [ ! -d /target/.minio.sys/buckets/media ]; then exit 0; fi
        drift="$(find /target/.minio.sys/buckets/media \
          \( ! -uid {{ service_identities.minio.uid | int }}
          -o ! -gid {{ service_identities.minio.gid | int }} \)
          -print -quit 2>/dev/null || true)"
        if [ -n "$drift" ]; then
          chown -R {{ service_identities.minio.uid | int }}:{{ service_identities.minio.gid | int }}
            /target/.minio.sys/buckets/media
          echo fixed
        fi
  register: minio_metadata_fix
  changed_when: "'fixed' in minio_metadata_fix.stdout"
  when:
    - permissions_mode_selected == 'runtime'
    - minio_volume_path | length > 0
    - minio_volume_path.startswith('/')

- name: Render and install rclone config into internal volume
  ansible.builtin.include_role:
    name: rclone_config


- name: Tear down existing Docker compose stack
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --project-name
      - "{{ project_name_selected }}"
      - --project-directory
      - "{{ repo_root_path }}"
      - --env-file
      - "{{ repo_root_path }}/.env"
      - -f
      - "{{ repo_root_path }}/compose/base.yml"
      - -f
      - "{{ repo_root_path }}/compose/dev.yml"
      - down
      - --remove-orphans
  register: compose_down
  failed_when: false
  changed_when: compose_down.rc == 0
  when: permissions_mode_selected == 'runtime'

- name: Normalize MinIO data path ownership for runtime
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - -v
      - "{{ minio_volume_path }}:/target"
      - alpine:3.20
      - sh
      - -lc
      - |
        set -e
        mkdir -p /target
        drift="$(find /target \( ! -uid {{ service_identities.minio.uid | int }} \
          -o ! -gid {{ service_identities.minio.gid | int }} \) -print -quit 2>/dev/null || true)"
        if [ -n "$drift" ]; then
          chown -R {{ service_identities.minio.uid | int }}:{{ service_identities.minio.gid | int }} /target
          chmod -R u+rwX /target
          echo fixed
        fi
  register: minio_data_fix
  changed_when: "'fixed' in minio_data_fix.stdout"
  when:
    - permissions_mode_selected == 'runtime'
    - minio_volume_path | length > 0
    - minio_volume_path.startswith('/')

- name: "Debug: report repo_root_path and MEDIA_MOUNT_DIR"
  ansible.builtin.debug:
    msg: "repo_root_path={{ repo_root_path }} MEDIA_MOUNT_DIR={{ lookup('ansible.builtin.env', 'MEDIA_MOUNT_DIR', default=repo_root_path ~ '/runtime/media') }}"
  when: permissions_mode_selected == 'runtime'

- name: Heal stale media mountpoint before compose startup
  become: "{{ runtime_recover_with_become_enabled | bool }}"
  ansible.builtin.shell: |
    set -euo pipefail
    media_path="{{ lookup('ansible.builtin.env', 'MEDIA_MOUNT_DIR', default=repo_root_path ~ '/runtime/media') }}"

    # Fast path: path is accessible, nothing to do
    if stat "$media_path" >/dev/null 2>&1; then
      exit 0
    fi

    # Unmount stale FUSE mount.
    # Plain umount (no -l) is critical: lazy unmount detaches from VFS but
    # leaves a zombie in the rshared peer group, causing ENOTCONN when Docker
    # sets up rshared bind mounts for the rclone container.
    if command -v fusermount3 >/dev/null 2>&1; then
      fusermount3 -u "$media_path" 2>/dev/null || true
    elif command -v fusermount >/dev/null 2>&1; then
      fusermount -u "$media_path" 2>/dev/null || true
    fi
    umount "$media_path" 2>/dev/null || umount -f "$media_path" 2>/dev/null || true

    # Recreate directory with a clean inode
    rm -rf "$media_path" 2>/dev/null || true
    mkdir -p "$media_path"

    if ! stat "$media_path" >/dev/null 2>&1; then
      echo "[ERROR] heal failed — mountpoint still inaccessible" >&2
      exit 1
    fi
    echo healed
  args:
    executable: /bin/bash
  register: media_mount_heal
  changed_when: "'healed' in media_mount_heal.stdout"
  when: permissions_mode_selected == 'runtime'

- name: Start docker compose stack
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --project-name
      - "{{ project_name_selected }}"
      - --project-directory
      - "{{ repo_root_path }}"
      - --env-file
      - "{{ repo_root_path }}/.env"
      - -f
      - "{{ repo_root_path }}/compose/base.yml"
      - -f
      - "{{ repo_root_path }}/compose/dev.yml"
      - up
      - -d
      - --remove-orphans
  register: compose_up
  changed_when: compose_up.rc == 0
  when: permissions_mode_selected == 'runtime'

- name: Run post-startup validation (Jellyfin media + named volume ownership)
  ansible.builtin.include_role:
    name: validate
  when: permissions_mode_selected == 'runtime'

- name: Ensure MinIO media bucket is public
  ansible.builtin.include_role:
    name: minio_bucket
  when:
    - permissions_mode_selected == 'runtime'
    - rclone_env.MINIO_ROOT_USER | length > 0
    - rclone_env.MINIO_ROOT_PASSWORD | length > 0
