- name: Load compose base configuration for identity drift checks
  ansible.builtin.include_vars:
    file: "{{ repo_root_path }}/compose/base.yml"
    name: compose_base

- name: Derive service identities from compose base configuration
  ansible.builtin.set_fact:
    compose_jellyfin_user: "{{ (((compose_base.services | default({})).jellyfin | default({})).user | default('')) }}"
    compose_baikal_user: "{{ (((compose_base.services | default({})).baikal | default({})).user | default('')) }}"
    compose_minio_user: "{{ (((compose_base.services | default({})).minio | default({})).user | default('')) }}"
    compose_rclone_env: "{{ (((compose_base.services | default({})).rclone | default({})).environment | default([])) }}"

- name: Build service identity map from compose
  ansible.builtin.set_fact:
    service_identities:
      jellyfin:
        uid: "{{ compose_jellyfin_user.split(':')[0] | int }}"
        gid: "{{ compose_jellyfin_user.split(':')[1] | int }}"
        comment: "{{ permissions_data.users.jellyfin.comment | default('jellyfin') }}"
      baikal:
        uid: "{{ compose_baikal_user.split(':')[0] | int }}"
        gid: "{{ compose_baikal_user.split(':')[1] | int }}"
        comment: "{{ permissions_data.users.baikal.comment | default('baikal') }}"
      rclone:
        uid: "{{ (compose_rclone_env | select('match', '^PUID=') | list | first | default('PUID=8097')) | regex_replace('^PUID=', '') | int }}"
        gid: "{{ (compose_rclone_env | select('match', '^MEDIA_GID=') | list | first | default('MEDIA_GID=5572')) | regex_replace('^MEDIA_GID=', '') | int }}"
        comment: "{{ permissions_data.users.rclone.comment | default('rclone') }}"
      minio:
        uid: "{{ compose_minio_user.split(':')[0] | int }}"
        gid: "{{ compose_minio_user.split(':')[1] | int }}"
        comment: "{{ permissions_data.users.minio.comment | default('minio') }}"

- name: Derive MinIO bind path from permissions manifest
  ansible.builtin.set_fact:
    minio_volume_path: "{{ (((volume_entries | selectattr('owner', 'equalto', 'minio') | list | first | default({})).path) | default('')) }}"

- name: Ensure declared groups exist
  become: true
  ansible.builtin.group:
    name: "{{ item.key }}"
    gid: "{{ item.value.gid | int }}"
    non_unique: true
    state: present
  loop: "{{ service_identities | dict2items }}"
  when: apply_privileged

- name: Ensure declared users exist
  become: true
  ansible.builtin.user:
    name: "{{ item.key }}"
    uid: "{{ item.value.uid | int }}"
    group: "{{ item.key }}"
    shell: /usr/sbin/nologin
    create_home: false
    comment: "{{ item.value.comment | default(item.key) }}"
    state: present
  loop: "{{ service_identities | dict2items }}"
  when: apply_privileged

- name: Ensure volume directories exist
  ansible.builtin.file:
    path: "{{ item.path if item.path.startswith('/') else repo_root_path ~ '/' ~ item.path }}"
    state: directory
  loop: "{{ volume_entries }}"
  when: item.path | default('') | length > 0

- name: Apply ownership and mode for declared volumes
  become: true
  ansible.builtin.file:
    path: "{{ item.path if item.path.startswith('/') else repo_root_path ~ '/' ~ item.path }}"
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode | default('0755') }}"
    recurse: "{{ item.recurse | default(false) | bool }}"
    state: directory
  loop: "{{ volume_entries }}"
  when:
    - apply_privileged
    - item.path | default('') | length > 0

- name: Apply runtime mode for declared volumes
  ansible.builtin.file:
    path: "{{ item.path if item.path.startswith('/') else repo_root_path ~ '/' ~ item.path }}"
    mode: "{{ item.runtime_mode | default(item.mode | default('0755')) }}"
    recurse: "{{ item.runtime_recurse | default(false) | bool }}"
    state: directory
  loop: "{{ volume_entries }}"
  when:
    - permissions_mode_selected == 'runtime'
    - item.path | default('') | length > 0
    - item.runtime_mode is defined

- name: Normalize MinIO media bucket metadata ownership
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - -v
      - "{{ minio_volume_path }}:/target"
      - alpine:3.20
      - sh
      - -lc
      - >-
        test -d /target/.minio.sys/buckets/media || exit 0;
        drift="$(find /target/.minio.sys/buckets/media \( ! -uid {{ service_identities.minio.uid | int }} -o ! -gid {{ service_identities.minio.gid | int }} \) -print -quit 2>/dev/null || true)";
        if [ -n "$drift" ]; then
          chown -R {{ service_identities.minio.uid | int }}:{{ service_identities.minio.gid | int }} /target/.minio.sys/buckets/media;
          echo fixed;
        fi
  register: minio_metadata_fix
  changed_when: "'fixed' in minio_metadata_fix.stdout"
  when:
    - permissions_mode_selected == 'runtime'
    - minio_volume_path | length > 0
    - minio_volume_path.startswith('/')

- name: Create temporary staging directory for internal rclone config
  ansible.builtin.tempfile:
    state: directory
    prefix: rclone-config-
  register: rclone_config_staging

- name: Ensure internal rclone config volume exists
  community.docker.docker_volume:
    name: "{{ rclone_config_volume_name }}"
    state: present

- name: Validate required environment for rclone template
  ansible.builtin.assert:
    that:
      - rclone_env.PCLOUD_ACCESS_TOKEN | length > 0
      - rclone_env.PCLOUD_EXPIRY | length > 0
      - rclone_env.MINIO_ROOT_USER | length > 0
      - rclone_env.MINIO_ROOT_PASSWORD | length > 0
    fail_msg: >-
      Missing env vars required for rclone config rendering.
      Ensure PCLOUD_ACCESS_TOKEN, PCLOUD_EXPIRY, and MINIO_ROOT_USER/MINIO_ROOT_PASSWORD
      (or S3_ACCESS_KEY/S3_SECRET_KEY aliases) are exported.

- name: Render rclone config from template
  ansible.builtin.template:
    src: "{{ repo_root_path }}/ansible/templates/rclone.conf.j2"
    dest: "{{ rclone_config_staging.path }}/rclone.conf"
    mode: "0600"

- name: Copy rendered rclone config into internal volume
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - -v
      - "{{ rclone_config_volume_name }}:/config/rclone"
      - -v
      - "{{ rclone_config_staging.path }}:/staging:ro"
      - alpine:3.20
      - sh
      - -lc
      - "cp /staging/rclone.conf /config/rclone/rclone.conf && chmod 0600 /config/rclone/rclone.conf"

- name: Remove temporary staging directory for internal rclone config
  ansible.builtin.file:
    path: "{{ rclone_config_staging.path }}"
    state: absent

- name: Remove legacy Podman app containers if present
  ansible.builtin.shell: |
    set -eu
    if ! command -v podman >/dev/null 2>&1; then
      exit 0
    fi
    for name in baikal jellyfin minio rclone; do
      if podman container exists "$name" 2>/dev/null; then
        podman rm -f "$name" >/dev/null 2>&1 || true
        printf '%s\n' "$name"
      fi
    done
  args:
    executable: /bin/bash
  register: legacy_podman_cleanup
  failed_when: false
  changed_when: legacy_podman_cleanup.stdout | length > 0
  when: permissions_mode_selected == 'runtime'

- name: Tear down existing Docker compose stack
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --project-name
      - "{{ project_name_selected }}"
      - --project-directory
      - "{{ repo_root_path }}"
      - --env-file
      - "{{ repo_root_path }}/.env"
      - -f
      - "{{ repo_root_path }}/compose/base.yml"
      - -f
      - "{{ repo_root_path }}/compose/dev.yml"
      - down
      - --remove-orphans
  register: compose_down
  failed_when: false
  changed_when: compose_down.rc == 0
  when: permissions_mode_selected == 'runtime'

- name: Normalize MinIO data path ownership for runtime
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - -v
      - "{{ minio_volume_path }}:/target"
      - alpine:3.20
      - sh
      - -lc
      - >-
        mkdir -p /target &&
        chown -R {{ service_identities.minio.uid | int }}:{{ service_identities.minio.gid | int }} /target &&
        chmod -R u+rwX /target
  when:
    - permissions_mode_selected == 'runtime'
    - minio_volume_path | length > 0
    - minio_volume_path.startswith('/')

- name: Start docker compose stack
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --project-name
      - "{{ project_name_selected }}"
      - --project-directory
      - "{{ repo_root_path }}"
      - --env-file
      - "{{ repo_root_path }}/.env"
      - -f
      - "{{ repo_root_path }}/compose/base.yml"
      - -f
      - "{{ repo_root_path }}/compose/dev.yml"
      - up
      - -d
      - --remove-orphans
  when: permissions_mode_selected == 'runtime'

- name: Assert Jellyfin can read mounted media path
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - jellyfin
      - sh
      - -lc
      - >-
        grep -q " /media " /proc/self/mountinfo &&
        test -r /media &&
        ! test -w /media &&
        ls /media >/dev/null
  register: jellyfin_media_access
  retries: 12
  delay: 5
  until: jellyfin_media_access.rc == 0
  changed_when: false
  when: permissions_mode_selected == 'runtime'

- name: Ensure MinIO media bucket is public
  block:
    - name: Wait for MinIO API readiness
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - minio
          - sh
          - -lc
          - "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null"
      register: minio_ready
      retries: 24
      delay: 5
      until: minio_ready.rc == 0

    - name: Configure mc alias for MinIO
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - minio
          - mc
          - alias
          - set
          - myminio
          - "http://127.0.0.1:9000"
          - "{{ rclone_env.MINIO_ROOT_USER }}"
          - "{{ rclone_env.MINIO_ROOT_PASSWORD }}"
      register: minio_alias
      retries: 6
      delay: 5
      until: minio_alias.rc == 0

    - name: Check whether myminio/media exists
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - minio
          - mc
          - stat
          - myminio/media
      register: minio_media_stat
      failed_when: false
      changed_when: false

    - name: Create myminio/media bucket if missing
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - minio
          - mc
          - mb
          - myminio/media
      when: minio_media_stat.rc != 0

    - name: Ensure anonymous download policy on myminio/media
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - minio
          - mc
          - anonymous
          - set
          - download
          - myminio/media
      register: minio_anon
      retries: 3
      delay: 2
      until: minio_anon.rc == 0
      when:
        - "minio_media_stat.rc != 0 or 'Anonymous: Enabled' not in minio_media_stat.stdout"
  when:
    - permissions_mode_selected == 'runtime'
    - rclone_env.MINIO_ROOT_USER | length > 0
    - rclone_env.MINIO_ROOT_PASSWORD | length > 0

- name: Define named volume ownership rules
  ansible.builtin.set_fact:
    named_volume_ownership_rules:
      - name: jellyfin
        owner_uid: "{{ service_identities.jellyfin.uid | int }}"
        owner_gid: "{{ service_identities.jellyfin.gid | int }}"
        volumes:
          - jellyfin_cache_data
          - jellyfin_config
          - jellyfin_data
      - name: baikal
        owner_uid: "{{ service_identities.baikal.uid | int }}"
        owner_gid: "{{ service_identities.baikal.gid | int }}"
        volumes:
          - baikal_config
          - baikal_data
  when: permissions_mode_selected == 'runtime'

- name: Normalize named volume ownership
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - -v
      - "{{ item.1 }}:/target"
      - alpine:3.20
      - sh
      - -lc
      - >-
        mkdir -p /target &&
        chown -R {{ item.0.owner_uid }}:{{ item.0.owner_gid }} /target &&
        chmod -R u+rwX /target
  loop: "{{ named_volume_ownership_rules | subelements('volumes') }}"
  when: permissions_mode_selected == 'runtime'
