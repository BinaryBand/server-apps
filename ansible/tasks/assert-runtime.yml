    - name: Assert rclone config exists in container
      community.docker.docker_container_exec:
        container: rclone
        command: >-
          /bin/sh -c 'test -f /config/rclone/rclone.conf'
      register: _rclone_conf_check
      failed_when: _rclone_conf_check.rc != 0

    - name: Assert rclone can contact MinIO
      community.docker.docker_container_exec:
        container: rclone
        command: >-
          /bin/sh -c 'rclone lsd minio: --max-depth 1'
      register: _rclone_minio_check
      failed_when: _rclone_minio_check.rc != 0

    - name: Assert rclone can contact pCloud
      community.docker.docker_container_exec:
        container: rclone
        command: >-
          /bin/sh -c 'rclone lsd pcloud: --max-depth 1'
      register: _rclone_pcloud_check
      failed_when: _rclone_pcloud_check.rc != 0

    - name: Wait for Jellyfin health status
      ansible.builtin.command:
        argv:
          - docker
          - ps
          - --filter
          - name=jellyfin
          - --filter
          - health=healthy
          - --format={{ '{{.Names}}' }}
      register: _jellyfin_health_check
      changed_when: false
      retries: 12
      delay: 5
      until: _jellyfin_health_check.stdout.strip() == 'jellyfin'

    - name: Assert Jellyfin can write to logs directory
      community.docker.docker_container_exec:
        container: jellyfin
        command: >-
          /bin/sh -c 'touch /logs/.jellyfin-log.assert && rm -f /logs/.jellyfin-log.assert'
      register: _jellyfin_logs_check
      failed_when: _jellyfin_logs_check.rc != 0