---
# Enforces the systemd unit desired state declared in ansible/systemd_units.yml.
# Units matching the namespace prefix that are NOT listed there will be purged.
#
# Usage:
#   ansible-playbook -i ansible/inventory.ini ansible/playbooks/install-timers.yml
#   ansible-playbook -i ansible/inventory.ini ansible/playbooks/install-timers.yml \
#     -e "systemd_enforcer_project_dir=/opt/server-apps" \
#     -e "systemd_enforcer_service_user=owen"
- name: Enforce systemd unit desired state
  hosts: all
  gather_facts: false
  roles:
    - systemd_enforcer
