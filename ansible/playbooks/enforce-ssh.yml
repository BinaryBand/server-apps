---
# Enforces the SSH authorized key desired state declared in ansible/ssh_access.yml.
# Keys present on the host but NOT listed there will be removed.
#
# Usage:
#   ansible-playbook -i ansible/inventory.ini ansible/playbooks/enforce-ssh.yml
- name: Enforce SSH authorized keys
  hosts: all
  gather_facts: false
  roles:
    - ssh_enforcer
  vars:
    repo_root_path: "{{ repo_root | default(playbook_dir ~ '/../..' if playbook_dir.endswith('/playbooks') else playbook_dir ~ '/..') }}"
