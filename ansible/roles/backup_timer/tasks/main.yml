---
- name: Template service file
  become: true
  ansible.builtin.template:
    src: server-apps-backup.service.j2
    dest: /etc/systemd/system/server-apps-backup.service
    owner: root
    group: root
    mode: '0644'
  notify: Reload systemd

- name: Template timer file
  become: true
  ansible.builtin.template:
    src: server-apps-backup.timer.j2
    dest: /etc/systemd/system/server-apps-backup.timer
    owner: root
    group: root
    mode: '0644'
  notify: Reload systemd

- name: Ensure timer is enabled and started
  become: true
  ansible.builtin.systemd:
    name: server-apps-backup.timer
    enabled: true
    state: started
    daemon_reload: true
