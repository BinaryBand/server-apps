---
# Ensures host-bind volume directories exist and have correct ownership/mode.
# Expects: volume_entries, repo_root_path, apply_privileged, permissions_mode_selected

- name: Ensure volume directories exist
  ansible.builtin.file:
    path: "{{ item.path if item.path.startswith('/') else repo_root_path ~ '/' ~ item.path }}"
    mode: "{{ item.mode | default('0755') if apply_privileged else omit }}"
    state: directory
  loop: "{{ volume_entries }}"
  when: item.path | default('') | length > 0

- name: Inspect volume ownership for runtime mode
  ansible.builtin.stat:
    path: "{{ item.path if item.path.startswith('/') else repo_root_path ~ '/' ~ item.path }}"
  loop: "{{ volume_entries }}"
  register: storage_runtime_volume_stats
  when:
    - permissions_mode_selected == 'runtime'
    - item.path | default('') | length > 0

- name: Apply ownership and mode for declared volumes (bootstrap)
  become: true
  ansible.builtin.file:
    path: "{{ item.path if item.path.startswith('/') else repo_root_path ~ '/' ~ item.path }}"
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode | default('0755') }}"
    recurse: "{{ item.recurse | default(false) | bool }}"
    state: directory
  loop: "{{ volume_entries }}"
  when:
    - apply_privileged
    - item.path | default('') | length > 0

- name: Apply runtime mode for declared volumes (owned by current user)
  ansible.builtin.file:
    path: "{{ item.path if item.path.startswith('/') else repo_root_path ~ '/' ~ item.path }}"
    mode: "{{ item.runtime_mode | default(item.mode | default('0755')) }}"
    recurse: "{{ item.runtime_recurse | default(false) | bool }}"
    state: directory
  loop: "{{ volume_entries }}"
  loop_control:
    index_var: volume_idx
  when:
    - permissions_mode_selected == 'runtime'
    - item.path | default('') | length > 0
    - item.runtime_mode is defined
    - storage_runtime_volume_stats.results[volume_idx].stat.exists | default(false)
    - storage_runtime_volume_stats.results[volume_idx].stat.uid | default(-1) | int == (lookup('ansible.builtin.pipe', 'id -u') | int)

- name: Detect runtime mode drift on volumes not owned by current user
  ansible.builtin.set_fact:
    _storage_privileged_mode_paths: >-
      {{ _storage_privileged_mode_paths | default([]) +
         ([item.path if item.path.startswith('/') else repo_root_path ~ '/' ~ item.path]
          if (item.runtime_mode is defined and
              storage_runtime_volume_stats.results[volume_idx].stat.exists | default(false) and
              storage_runtime_volume_stats.results[volume_idx].stat.uid | default(-1) | int !=
              (lookup('ansible.builtin.pipe', 'id -u') | int))
          else []) }}
  loop: "{{ volume_entries }}"
  loop_control:
    index_var: volume_idx
  when:
    - permissions_mode_selected == 'runtime'
    - item.path | default('') | length > 0

- name: Apply runtime mode with elevated privileges (recovery)
  become: true
  ansible.builtin.file:
    path: "{{ item.path if item.path.startswith('/') else repo_root_path ~ '/' ~ item.path }}"
    mode: "{{ item.runtime_mode }}"
    recurse: "{{ item.runtime_recurse | default(false) | bool }}"
    state: directory
  loop: "{{ volume_entries }}"
  loop_control:
    index_var: volume_idx
  when:
    - permissions_mode_selected == 'runtime'
    - item.path | default('') | length > 0
    - item.runtime_mode is defined
    - storage_runtime_volume_stats.results[volume_idx].stat.exists | default(false)
    - storage_runtime_volume_stats.results[volume_idx].stat.uid | default(-1) | int != (lookup('ansible.builtin.pipe', 'id -u') | int)
    - runtime_recover_with_become_enabled | default(false) | bool

- name: Fail if runtime mode drift requires elevated privileges
  ansible.builtin.fail:
    msg: >-
      Permission drift detected on volume(s) not owned by the current user:
      {{ _storage_privileged_mode_paths | default([]) | join(', ') }}.
      Retrying with elevated privileges (sudo prompt will appear).
  when:
    - permissions_mode_selected == 'runtime'
    - (_storage_privileged_mode_paths | default([])) | length > 0
    - not (runtime_recover_with_become_enabled | default(false) | bool)
