---
# Ensures the MinIO media bucket exists and has an anonymous download policy.
# Expects: rclone_env (MINIO_ROOT_USER, MINIO_ROOT_PASSWORD)

- name: Wait for MinIO container to be healthy
  ansible.builtin.command:
    argv:
      - docker
      - inspect
      - "--format={{ '{{.State.Health.Status}}' }}"
      - minio
  register: minio_health_status
  until: "minio_health_status.stdout | trim == 'healthy'"
  retries: 40
  delay: 5
  changed_when: false

- name: Configure mc alias for MinIO
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - minio
      - mc
      - alias
      - set
      - myminio
      - "http://127.0.0.1:9000"
      - "{{ rclone_env.MINIO_ROOT_USER }}"
      - "{{ rclone_env.MINIO_ROOT_PASSWORD }}"
  register: minio_bucket_alias
  changed_when: false
  retries: 6
  delay: 5
  until: minio_bucket_alias.rc == 0

- name: Check whether myminio/media exists
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - minio
      - mc
      - stat
      - myminio/media
  register: minio_bucket_media_stat
  failed_when: false
  changed_when: false

- name: Create myminio/media bucket if missing
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - minio
      - mc
      - mb
      - myminio/media
  register: minio_bucket_create
  changed_when: minio_bucket_create.rc == 0
  when: minio_bucket_media_stat.rc != 0

- name: Ensure anonymous download policy on myminio/media
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - minio
      - mc
      - anonymous
      - set
      - download
      - myminio/media
  register: minio_bucket_anon
  changed_when: minio_bucket_anon.rc == 0
  retries: 3
  delay: 2
  until: minio_bucket_anon.rc == 0
  when:
    - "minio_bucket_media_stat.rc != 0 or 'Anonymous: Enabled' not in minio_bucket_media_stat.stdout"
