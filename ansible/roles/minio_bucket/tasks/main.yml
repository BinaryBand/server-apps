---
# Ensures the MinIO media bucket exists and has an anonymous download policy.
# Expects: rclone_env (MINIO_ROOT_USER, MINIO_ROOT_PASSWORD)

- name: Wait for MinIO API readiness
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - minio
      - sh
      - -lc
      - "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null"
  register: minio_ready
  retries: 24
  delay: 5
  until: minio_ready.rc == 0

- name: Configure mc alias for MinIO
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - minio
      - mc
      - alias
      - set
      - myminio
      - "http://127.0.0.1:9000"
      - "{{ rclone_env.MINIO_ROOT_USER }}"
      - "{{ rclone_env.MINIO_ROOT_PASSWORD }}"
  register: minio_alias
  retries: 6
  delay: 5
  until: minio_alias.rc == 0

- name: Check whether myminio/media exists
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - minio
      - mc
      - stat
      - myminio/media
  register: minio_media_stat
  failed_when: false
  changed_when: false

- name: Create myminio/media bucket if missing
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - minio
      - mc
      - mb
      - myminio/media
  when: minio_media_stat.rc != 0

- name: Ensure anonymous download policy on myminio/media
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - minio
      - mc
      - anonymous
      - set
      - download
      - myminio/media
  register: minio_anon
  retries: 3
  delay: 2
  until: minio_anon.rc == 0
  when:
    - "minio_media_stat.rc != 0 or 'Anonymous: Enabled' not in minio_media_stat.stdout"
