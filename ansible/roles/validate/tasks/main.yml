---
# Post-startup assertions: Jellyfin can read media, named volumes have correct ownership.
# Expects: service_identities, named_volume_ownership_rules

- name: Assert Jellyfin can read mounted media path
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - jellyfin
      - sh
      - -lc
      - >-
        grep -q " /media " /proc/self/mountinfo &&
        test -r /media &&
        ! test -w /media &&
        ls /media >/dev/null
  register: validate_jellyfin_media_access
  retries: 12
  delay: 5
  until: validate_jellyfin_media_access.rc == 0
  changed_when: false

- name: Define named volume ownership rules
  ansible.builtin.set_fact:
    validate_named_volume_ownership_rules:
      - name: jellyfin
        owner_uid: "{{ service_identities.jellyfin.uid | int }}"
        owner_gid: "{{ service_identities.jellyfin.gid | int }}"
        volumes:
          - jellyfin_cache_data
          - jellyfin_config
          - jellyfin_data
      - name: baikal
        owner_uid: "{{ service_identities.baikal.uid | int }}"
        owner_gid: "{{ service_identities.baikal.gid | int }}"
        volumes:
          - baikal_config
          - baikal_data

- name: Normalize named volume ownership
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - -v
      - "{{ item.1 }}:/target"
      - alpine:3.20
      - sh
      - -lc
      - >
        mkdir -p /target &&
        chown -R {{ item.0.owner_uid }}:{{ item.0.owner_gid }} /target &&
        chmod -R u+rwX /target
  loop: "{{ validate_named_volume_ownership_rules | subelements('volumes') }}"
  register: validate_named_volumes_fix
  changed_when: validate_named_volumes_fix.rc == 0
