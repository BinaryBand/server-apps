repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: lizard
        name: Lizard complexity check (CCN ≤ 5, length ≤ 25, params ≤ 4)
        entry: .venv/bin/lizard
        language: system
        args: ["src/", "-C", "5", "-L", "25", "-a", "4"]
        pass_filenames: false

      - id: vulture
        name: Vulture dead code check (min confidence 80)
        entry: .venv/bin/vulture
        language: system
        args: ["src", "runbook", "--min-confidence", "80"]
        pass_filenames: false

      - id: import-linter
        name: Import boundary contracts
        entry: .venv/bin/lint-imports
        language: system
        pass_filenames: false

      - id: jscpd
        name: jscpd duplicate detection
        entry: jscpd
        language: system
        args: ["--config", ".jscpd.json"]
        pass_filenames: false

      - id: semgrep
        name: Semgrep custom rules
        entry: .venv/bin/semgrep
        language: system
        args: ["--config", "rules/semgrep/", "src/", "--error"]
        pass_filenames: false
