# HTTP-only VirtualHost for Baikal.
# Port 443 is intentionally omitted: the compose service only exposes 5234:80
# and no SSL certificates are provisioned for this internal service.

# InjectedServerName dav.example.com

<VirtualHost *:80>

        # InjectedServerAlias dav.example.org dav.example.io
        DocumentRoot /var/www/baikal/html

        RewriteEngine On
        RewriteRule /.well-known/carddav /dav.php [R,L]
        RewriteRule /.well-known/caldav /dav.php [R,L]

        <Directory "/var/www/baikal/html">
                Options None
                Options +FollowSymlinks
                AllowOverride All

                # Configuration for apache-2.2:
                Order allow,deny
                Allow from all

                # Configuration for apache-2.4:
                Require all granted
        </Directory>

</VirtualHost>
