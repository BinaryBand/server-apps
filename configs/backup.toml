[batch]
# Paths staged locally and snapshotted by restic (versioned, deduplicated).
# Roots are relative to /data inside the gather container.
include = [
  # Jellyfin: config XMLs and library definitions
  "volumes/jellyfin_config/**",
  # Jellyfin: databases, playlists, user data, plugins, and virtual-folder state
  "volumes/jellyfin_data/data/**",
  "volumes/jellyfin_data/plugins/**",
  "volumes/jellyfin_data/root/**",
  # Baikal: CalDAV/CardDAV config and data
  "volumes/baikal_config/**",
  "volumes/baikal_data/**",
  # MinIO: config/identity + bucket metadata only (.minio.sys object data excluded below)
  "volumes/minio_data/.minio.sys/config/**",
  "volumes/minio_data/.minio.sys/buckets/*/.metadata.bin/**",
  "volumes/minio_data/.minio.sys/pool.bin",
  # MinIO notes bucket — versioned via restic
  "volumes/minio_data/notes/**",
]
exclude = [
  # Jellyfin: metadata artwork is large and can be regenerated
  "volumes/jellyfin_data/metadata/**",
  # Jellyfin: transcodes are transient scratch space
  "volumes/jellyfin_data/data/transcodes/**",
  # MinIO: volatile upload internals — never back up
  "volumes/minio_data/.minio.sys/tmp/**",
  "volumes/minio_data/.minio.sys/multipart/**",
]

[[stream]]
# MinIO object data: stream remaining buckets (not notes or media) directly
# from the host volume to pCloud. Excludes .minio.sys entirely — the critical
# parts (config, bucket metadata) are already versioned by restic above.
# To enable chunking for objects >2 GB, change destination to:
#   pcloud_chunker:Backups/Minio
name = "minio-objects"
source = "volumes/minio_data"
destination = "pcloud:Backups/Minio"
exclude = [".minio.sys/**", "notes/**", "media/**"]

[[stream]]
# Audio/media bucket: copy directly from the MinIO S3 remote via rclone.
# Keeps large-media transfers out of restic entirely.
name = "minio-media"
source = "minio:media"
destination = "pcloud:Backups/Minio/media"
exclude = []
