[pcloud]
type = pcloud
token = {"access_token":"${PCLOUD_ACCESS_TOKEN}","token_type":"bearer","expiry":"${PCLOUD_EXPIRY}"}
hostname = api.pcloud.com

[minio]
type = s3
provider = Minio
env_auth = false
access_key_id = ${MINIO_ROOT_USER}
secret_access_key = ${MINIO_ROOT_PASSWORD}
endpoint = http://minio:9000
acl = private

