# Declarative permissions manifest for host-side user/group and volume ownership
# - Keep secrets out of here; use Docker Secrets or a secrets manager.

users:
  jellyfin:
    uid: 8096
    gid: 5572
    comment: "Service account for Jellyfin (create on host if needed)"

  rclone:
    uid: 8097
    gid: 5572
    comment: "Service account for rclone mounts (shared group with media)"

  minio:
    uid: 1001
    gid: 1001
    comment: "MinIO service account (system user)"

volumes:
  ./.local/media:
    owner: jellyfin
    group: rclone
    mode: "0755"
    recurse: true

  ./.local/media/pcloud/Media:
    owner: rclone
    group: rclone
    mode: "0755"
    recurse: true

  ./.local/logs:
    owner: jellyfin
    group: jellyfin
    mode: "0775"
    recurse: true

  ./.local/restic:
    owner: root
    group: root
    mode: "0700"
    recurse: true


files:
  ./.local/logs/media.log:
    owner: root
    group: rclone
    mode: "0664"
    runtime_mode: "0664"

reset_paths:
  - path: ./.local/backups
  - path: ./.local/logs
  - path: ./.local/restic
  - path: ./.local/media
  - path: ./.local/rclone

services:
  jellyfin:
    run_as_user: jellyfin
    extra_groups:
      - rclone
    capabilities: []

  rclone:
    run_as_user: rclone
    extra_groups: []
    capabilities:
      - SYS_ADMIN

  minio:
    run_as_user: minio
    extra_groups: []
    capabilities: []

templates:
  rclone:
    src: ansible/templates/rclone.conf.j2
    parent_dir: ./.local/rclone
    dest: ./.local/rclone/rclone.conf
    owner: root
    group: root
    mode: "0600"

apply:
  method: script # options: script | ansible
  script: scripts/apply-perms.sh
