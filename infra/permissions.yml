# Declarative permissions manifest for host-side user/group and volume ownership
# - Keep secrets out of here; use Docker Secrets or a secrets manager.

# UID/GID values are declared once in compose/base.yml and derived from there
# at runtime. This file only describes the semantic role of each account.
users:
  baikal:
    comment: "Service account for Baikal data/config volumes"

  jellyfin:
    comment: "Service account for Jellyfin (create on host if needed)"

  rclone:
    comment: "Service account for rclone mounts (shared group with media)"

  minio:
    comment: "MinIO service account (system user)"

volumes:
  - path: "{{ lookup('ansible.builtin.env', 'MEDIA_DATA_PATH', default='./runtime/media') }}"
    owner: jellyfin
    group: rclone
    mode: "0755"
    recurse: true

  - path: "{{ lookup('ansible.builtin.env', 'MEDIA_DATA_PATH', default='./runtime/media') }}/pcloud/Media"
    owner: rclone
    group: rclone
    mode: "0755"
    recurse: true

  - path: "{{ lookup('ansible.builtin.env', 'LOGS_DIR', default='./runtime/logs') }}"
    owner: jellyfin
    group: jellyfin
    mode: "0775"
    runtime_mode: "0777"
    recurse: true

  - path: "{{ lookup('ansible.builtin.env', 'MINIO_DATA_DIR', default='./minio') }}"
    owner: minio
    group: minio
    mode: "0750"
    recurse: true

reset_paths:
  - path: "{{ lookup('ansible.builtin.env', 'LOGS_DIR', default='./runtime/logs') }}"
  - path: "{{ lookup('ansible.builtin.env', 'MEDIA_DATA_PATH', default='./runtime/media') }}"
