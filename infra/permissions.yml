# Declarative permissions manifest for host-side user/group and volume ownership
# - Keep secrets out of here; use Docker Secrets or a secrets manager.

users:
  jellyfin:
    uid: 8096
    gid: 5572
    comment: "Service account for Jellyfin (create on host if needed)"

  rclone:
    uid: 8097
    gid: 5572
    comment: "Service account for rclone mounts (shared group with media)"

  minio:
    uid: 1001
    gid: 1001
    comment: "MinIO service account (system user)"

volumes:
  - path: "{{ lookup('ansible.builtin.env', 'MEDIA_DATA_PATH', default='./runtime/media') }}"
    owner: jellyfin
    group: rclone
    mode: "0755"
    recurse: true

  - path: "{{ lookup('ansible.builtin.env', 'MEDIA_DATA_PATH', default='./runtime/media') }}/pcloud/Media"
    owner: rclone
    group: rclone
    mode: "0755"
    recurse: true

  - path: "{{ lookup('ansible.builtin.env', 'LOGS_DIR', default='./runtime/logs') }}"
    owner: jellyfin
    group: jellyfin
    mode: "0775"
    runtime_mode: "0777"
    recurse: true

  - path: "{{ lookup('ansible.builtin.env', 'RESTIC_REPO_DIR', default='') }}"
    owner: root
    group: root
    mode: "0700"
    recurse: true


files:
  - path: "{{ lookup('ansible.builtin.env', 'LOGS_DIR', default='./runtime/logs') }}/media.log"
    owner: root
    group: rclone
    mode: "0664"

reset_paths:
  - path: "{{ lookup('ansible.builtin.env', 'BACKUPS_DIR', default='') }}"
  - path: "{{ lookup('ansible.builtin.env', 'LOGS_DIR', default='./runtime/logs') }}"
  - path: "{{ lookup('ansible.builtin.env', 'RESTIC_REPO_DIR', default='') }}"
  - path: "{{ lookup('ansible.builtin.env', 'MEDIA_DATA_PATH', default='./runtime/media') }}"

services:
  jellyfin:
    run_as_user: jellyfin
    extra_groups:
      - rclone
    capabilities: []

  rclone:
    run_as_user: rclone
    extra_groups: []
    capabilities:
      - SYS_ADMIN

  minio:
    run_as_user: minio
    extra_groups: []
    capabilities: []

templates:
  rclone:
    src: ansible/templates/rclone.conf.j2
    owner: root
    group: root
    mode: "0600"

apply:
  method: script # options: script | ansible
  script: scripts/apply-perms.sh
