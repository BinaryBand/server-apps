# Declarative permissions manifest for host-side user/group and volume ownership
# - Keep secrets out of here; use Docker Secrets or a secrets manager.

users:
  jellyfin:
    uid: 8096
    gid: 5572
    comment: "Service account for Jellyfin (create on host if needed)"

  rclone:
    uid: 8097
    gid: 5572
    comment: "Service account for rclone mounts (shared group with media)"

  minio:
    uid: 1001
    gid: 1001
    comment: "MinIO service account (system user)"

volumes:
  ./.local/media:
    owner: jellyfin
    group: rclone
    mode: "0755"
    recurse: true

  ./.local/logs:
    owner: jellyfin
    group: jellyfin
    mode: "0750"
    recurse: true

  ./.local/restic:
    owner: root
    group: root
    mode: "0700"
    recurse: true

services:
  jellyfin:
    run_as_user: jellyfin
    extra_groups:
      - rclone
    capabilities: []

  rclone:
    run_as_user: rclone
    extra_groups: []
    capabilities:
      - SYS_ADMIN

  minio:
    run_as_user: minio
    extra_groups: []
    capabilities: []

apply:
  method: script # options: script | ansible
  script: scripts/apply-perms.sh
